name: "Gather Repository Stats"
description: "Gather GitHub repository statistics and optionally run migration audit"
author: "scottluskcis"

branding:
  icon: "bar-chart-2"
  color: "blue"

inputs:
  type:
    description: "Type of stats gathering: 'repository', 'organization', or 'combine'"
    required: false
    default: "repository"
  github-token:
    description: "GitHub token for authentication (e.g., github.token)"
    required: true
  ghec-token:
    description: "GitHub Enterprise Cloud token for authentication (optional, used if not in github.com to download dependencies from GHEC)"
    required: false
    default: ""
  access-token:
    description: "Personal access token with repo access for gathering stats"
    default: ""
    required: false
  github-app-id:
    description: "GitHub App ID for authentication (optional, requires private key)"
    default: ""
    required: false
  github-app-private-key:
    description: "GitHub App private key for authentication (optional, requires app ID)"
    default: ""
    required: false
  organization:
    description: "Organization or owner name"
    required: true
  repository:
    description: "Repository name if type is 'repository'"
    default: ""
    required: false
  output-dir:
    description: "Directory where output files will be stored"
    required: false
    default: "output"
  run-migration-audit:
    description: "Whether to run migration audit (true/false)"
    required: false
    default: "false"
  node-version:
    description: "Node.js version to use"
    required: false
    default: "25"
  base-url:
    description: "GitHub API base URL"
    required: false
    default: "https://api.github.com"
  skip-tls-verification:
    description: "Skip TLS certificate verification for the target GitHub instance (use for GHES with self-signed certs or IP-based access)"
    required: false
    default: "false"
  retention-days:
    description: "Number of days to retain artifacts"
    required: false
    default: "7"
  batch-size:
    description: "Number of repositories per batch (enables batch processing for large organizations)"
    required: false
    default: ""
  batch-index:
    description: "Zero-based batch index (used with batch-size for parallel matrix jobs)"
    required: false
    default: ""
  batch-delay:
    description: "Delay in seconds multiplied by batch index to stagger API requests and avoid rate limits"
    required: false
    default: ""

outputs:
  output-dir:
    description: "Directory where output files are stored"
    value: ${{ steps.setup-paths.outputs.output_dir }}
  organization:
    description: "Organization name"
    value: ${{ inputs.organization }}
  repository:
    description: "Repository name"
    value: ${{ inputs.repository }}
  stats-file:
    description: "Path to the stats markdown file"
    value: ${{ steps.setup-paths.outputs.output_dir }}/stats.md
  audit-file:
    description: "Path to the audit markdown file"
    value: ${{ steps.setup-paths.outputs.output_dir }}/audit.md
  migration-audit:
    description: "Whether migration audit was run (true/false)"
    value: ${{ inputs.run-migration-audit }}
  artifact-id:
    description: "ID of the uploaded artifact containing the stats"
    value: ${{ steps.upload-artifact.outputs.artifact-id }}

runs:
  using: "composite"
  steps:
    - name: Verify Repository Checkout
      shell: bash
      run: |
        if [ ! -d "$GITHUB_WORKSPACE" ] || [ -z "$(ls -A "$GITHUB_WORKSPACE" 2>/dev/null)" ]; then
          echo "::error::Repository must be checked out before running this action. Add 'uses: actions/checkout@v4' before this step."
          exit 1
        fi
        echo "✓ Repository checkout verified"

    - name: Validate Inputs
      shell: bash
      env:
        INPUT_TYPE: ${{ inputs.type }}
      run: |
        case "${INPUT_TYPE}" in
          repository|organization|combine)
            echo "✓ Valid type: ${INPUT_TYPE}"
            ;;
          *)
            echo "::error::Invalid type '${INPUT_TYPE}'. Must be one of: repository, organization, combine."
            exit 1
            ;;
        esac

    - name: Resolve GH_HOST
      id: resolve-host
      shell: bash
      run: |
        BASE_URL="${{ inputs.base-url }}"
        # Strip protocol
        HOST="${BASE_URL#https://}"
        HOST="${HOST#http://}"
        # Remove any trailing path
        HOST="${HOST%%/*}"
        # For public GitHub, api.github.com -> github.com
        if [[ "$HOST" == api.* ]]; then
          HOST="${HOST#api.}"
        fi
        echo "GH_HOST=${HOST}" >> $GITHUB_ENV
        echo "gh_host=${HOST}" >> $GITHUB_OUTPUT
        echo "✓ Resolved GH_HOST: ${HOST}"

    - name: Configure TLS for GHES
      if: ${{ inputs.skip-tls-verification == 'true' }}
      shell: bash
      run: |
        HOST="${{ steps.resolve-host.outputs.gh_host }}"

        # Guard: refuse to disable TLS for public github.com
        if [[ "$HOST" == "github.com" ]]; then
          echo "::error::Refusing to disable TLS verification for public github.com. Remove 'skip-tls-verification' or use a GHES base-url."
          exit 1
        fi

        echo "Configuring TLS bypass for non-github.com host: ${HOST}"

        # Disable SSL verification for Node.js (Octokit/actions)
        echo "NODE_TLS_REJECT_UNAUTHORIZED=0" >> $GITHUB_ENV

        # Suppress Node.js TLS warnings
        echo "NODE_NO_WARNINGS=1" >> $GITHUB_ENV

        # Disable SSL verification for Git operations scoped to the GHES host
        git config --global "http.https://${HOST}/.sslVerify" false

        # Disable SSL verification for gh CLI (Go-based, not affected by NODE_TLS)
        # skip_tls_verification requires gh >= 2.54.0
        GH_VERSION=$(gh --version | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
        echo "  gh CLI version: ${GH_VERSION}"
        GH_MAJOR=$(echo "$GH_VERSION" | cut -d. -f1)
        GH_MINOR=$(echo "$GH_VERSION" | cut -d. -f2)
        if [[ "$GH_MAJOR" -gt 2 ]] || { [[ "$GH_MAJOR" -eq 2 ]] && [[ "$GH_MINOR" -ge 54 ]]; }; then
          gh config set -h "${HOST}" skip_tls_verification true
          echo "✓ TLS bypass configured via gh config for ${HOST}"
        else
          echo "⚠️  gh CLI ${GH_VERSION} does not support skip_tls_verification (requires >= 2.54.0)"
          echo "  Attempting to upgrade gh CLI..."
          if command -v apt-get &> /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update -qq && sudo apt-get install -qq -y gh > /dev/null 2>&1
          elif command -v brew &> /dev/null; then
            brew upgrade gh 2>/dev/null || brew install gh 2>/dev/null
          fi
          NEW_VERSION=$(gh --version | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "  gh CLI version after upgrade: ${NEW_VERSION}"
          NEW_MAJOR=$(echo "$NEW_VERSION" | cut -d. -f1)
          NEW_MINOR=$(echo "$NEW_VERSION" | cut -d. -f2)
          if [[ "$NEW_MAJOR" -gt 2 ]] || { [[ "$NEW_MAJOR" -eq 2 ]] && [[ "$NEW_MINOR" -ge 54 ]]; }; then
            gh config set -h "${HOST}" skip_tls_verification true
          else
            echo "::warning::gh CLI ${NEW_VERSION} still does not support skip_tls_verification. gh API calls to GHES may fail with TLS errors. Node.js, Git, and curl TLS bypass are still active."
          fi
        fi

        echo "✓ TLS bypass configured for ${HOST}"

    - name: Setup Paths
      id: setup-paths
      shell: bash
      run: |
        OUTPUT_DIR_INPUT="${{ inputs.output-dir }}"
        # If the input is already an absolute path, use it as-is
        if [[ "$OUTPUT_DIR_INPUT" = /* ]]; then
          OUTPUT_DIR="$OUTPUT_DIR_INPUT"
        else
          OUTPUT_DIR="${GITHUB_WORKSPACE}/${OUTPUT_DIR_INPUT}"
        fi
        echo "output_dir=${OUTPUT_DIR}" >> $GITHUB_OUTPUT

        REPOSITORY="${{ inputs.repository }}"
        if [[ -n "$REPOSITORY" ]]; then
          FILE="${GITHUB_WORKSPACE}/repo-info.txt"
          echo "${{ inputs.organization }}/${REPOSITORY}" > "$FILE"
          echo "file=${FILE}" >> $GITHUB_OUTPUT
        else
          echo "file=" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub App token
      id: app-install
      if: ${{ inputs.github-app-id != '' && inputs.github-app-private-key != '' }}
      uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf #v2.2.1
      with:
        app-id: ${{ inputs.github-app-id }}
        private-key: ${{ inputs.github-app-private-key }}
        owner: ${{ inputs.organization }}
        github-api-url: ${{ inputs.base-url }}
        repositories: ${{ inputs.repository }}

    - name: Validate Repository Exists
      if: ${{ inputs.type == 'repository' }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-install.outputs.token || inputs.access-token || inputs.github-token }}
        GH_HOST: ${{ steps.resolve-host.outputs.gh_host }}
        BASE_URL: ${{ inputs.base-url }}
        TOKEN_SOURCE: ${{ steps.app-install.outputs.token != '' && 'GitHub App' || (inputs.access-token != '' && 'Access Token' || 'github-token (fallback)') }}
        SKIP_TLS: ${{ inputs.skip-tls-verification }}
      run: |
        echo "Validating repository: ${{ inputs.organization }}/${{ inputs.repository }}"
        echo "  GH_HOST: ${GH_HOST}"
        echo "  Base URL: ${BASE_URL}"
        echo "  Token length: ${#GH_TOKEN}"
        echo "  Token source: ${TOKEN_SOURCE}"
        echo "  Skip TLS: ${SKIP_TLS}"

        CURL_OPTS=(-s --max-time 15)
        if [[ "${SKIP_TLS}" == "true" ]]; then
          CURL_OPTS+=(-k)
        fi

        HTTP_CODE=$(curl "${CURL_OPTS[@]}" \
          -H "Authorization: token ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -o /tmp/repo-validate.json \
          -w "%{http_code}" \
          "${BASE_URL}/repos/${{ inputs.organization }}/${{ inputs.repository }}") || true

        if [[ "$HTTP_CODE" == "200" ]]; then
          FULL_NAME=$(jq -r '.full_name' /tmp/repo-validate.json 2>/dev/null)
          echo "✓ Repository exists and is accessible: ${FULL_NAME}"
          exit 0
        fi

        echo "::error::Failed to validate repository: ${{ inputs.organization }}/${{ inputs.repository }}"
        echo "  HTTP status: ${HTTP_CODE}"
        echo "  Response:"
        cat /tmp/repo-validate.json 2>/dev/null || echo "  (no response body)"
        exit 1

    - name: Validate Organization Exists
      if: ${{ inputs.type == 'organization' }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-install.outputs.token || inputs.access-token || inputs.github-token }}
        GH_HOST: ${{ steps.resolve-host.outputs.gh_host }}
        BASE_URL: ${{ inputs.base-url }}
        TOKEN_SOURCE: ${{ steps.app-install.outputs.token != '' && 'GitHub App' || (inputs.access-token != '' && 'Access Token' || 'github-token (fallback)') }}
        SKIP_TLS: ${{ inputs.skip-tls-verification }}
      run: |
        echo "Validating organization: ${{ inputs.organization }}"
        echo "  GH_HOST: ${GH_HOST}"
        echo "  Base URL: ${BASE_URL}"
        echo "  Token length: ${#GH_TOKEN}"
        echo "  Token source: ${TOKEN_SOURCE}"
        echo "  Skip TLS: ${SKIP_TLS}"

        CURL_OPTS=(-s --max-time 15)
        if [[ "${SKIP_TLS}" == "true" ]]; then
          CURL_OPTS+=(-k)
        fi

        HTTP_CODE=$(curl "${CURL_OPTS[@]}" \
          -H "Authorization: token ${GH_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          -o /tmp/org-validate.json \
          -w "%{http_code}" \
          "${BASE_URL}/orgs/${{ inputs.organization }}") || true

        if [[ "$HTTP_CODE" == "200" ]]; then
          LOGIN=$(jq -r '.login' /tmp/org-validate.json 2>/dev/null)
          echo "✓ Organization exists and is accessible: ${LOGIN}"
          exit 0
        fi

        echo "::error::Failed to validate organization: ${{ inputs.organization }}"
        echo "  HTTP status: ${HTTP_CODE}"
        echo "  Response:"
        cat /tmp/org-validate.json 2>/dev/null || echo "  (no response body)"
        exit 1

    - name: Setup Node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 #v6.2.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Dependencies
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.ghec-token || inputs.github-token }}
        GH_HOST: github.com
      run: |
        echo "Installing GitHub CLI extension gh-repo-stats-plus"
        gh extension install mona-actions/gh-repo-stats-plus
        gh repo-stats-plus --version

        echo "Installing GitHub CLI extension gh-migration-audit"
        gh extension install timrogers/gh-migration-audit
        gh migration-audit --version

        echo "✓ Dependencies installed successfully"

    - name: Gather Repo Stats
      if: ${{ inputs.type != 'combine' }}
      shell: bash
      env:
        BATCH_SIZE: ${{ inputs.batch-size }}
        BATCH_INDEX: ${{ inputs.batch-index }}
        BATCH_DELAY: ${{ inputs.batch-delay }}
      run: |
        BATCH_ARGS=()
        if [[ -n "${BATCH_SIZE}" ]]; then
          [[ "${BATCH_SIZE}" =~ ^[0-9]+$ ]] && [[ "${BATCH_SIZE}" -ge 1 ]] || { echo "::error::batch-size must be a positive integer"; exit 1; }
          BATCH_ARGS+=(--batch-size "${BATCH_SIZE}")
        fi
        if [[ -n "${BATCH_INDEX}" ]]; then
          [[ "${BATCH_INDEX}" =~ ^[0-9]+$ ]] || { echo "::error::batch-index must be a non-negative integer"; exit 1; }
          BATCH_ARGS+=(--batch-index "${BATCH_INDEX}")
        fi
        if [[ -n "${BATCH_DELAY}" ]]; then
          [[ "${BATCH_DELAY}" =~ ^[0-9]+$ ]] || { echo "::error::batch-delay must be a non-negative integer"; exit 1; }
          BATCH_ARGS+=(--batch-delay "${BATCH_DELAY}")
        fi

        gh repo-stats-plus repo-stats \
          --org-name "${{ inputs.organization }}" \
          --access-token "${{ inputs.access-token }}" \
          --app-id "${{ inputs.github-app-id }}" \
          --private-key "${{ inputs.github-app-private-key }}" \
          --app-installation-id "${{ steps.app-install.outputs.installation-id }}" \
          --base-url "${{ inputs.base-url }}" \
          --repo-list "${{ steps.setup-paths.outputs.file }}" \
          --output-dir "${{ steps.setup-paths.outputs.output_dir }}" \
          "${BATCH_ARGS[@]}"

        echo "✓ Repository statistics gathered successfully"

    - name: Run Migration Audit for Repository
      id: migration-audit-repo
      if: ${{ inputs.run-migration-audit == 'true' && inputs.type == 'repository' }}
      continue-on-error: true
      shell: bash
      run: |
        gh migration-audit audit-repo \
          --access-token "${{ inputs.access-token }}" \
          --app-id "${{ inputs.github-app-id }}" \
          --private-key "${{ inputs.github-app-private-key }}" \
          --app-installation-id "${{ steps.app-install.outputs.installation-id }}" \
          --owner ${{ inputs.organization }} \
          --repo ${{ inputs.repository }} \
          --output-path ${{ steps.setup-paths.outputs.output_dir }}/${{ inputs.repository }}-audit.csv \
          --base-url ${{ inputs.base-url }} \
          --disable-telemetry

        echo "✓ Migration audit for repository completed successfully"

    - name: Warn on Migration Audit Failure (Repository)
      if: ${{ steps.migration-audit-repo.outcome == 'failure' }}
      shell: bash
      run: |
        echo "::warning::Migration audit failed but repo stats completed successfully. Check logs above for audit errors."

    - name: Run Migration Audit for Organization
      id: migration-audit-org
      if: ${{ inputs.run-migration-audit == 'true' && inputs.type == 'organization' }}
      continue-on-error: true
      shell: bash
      run: |
        gh migration-audit audit-all \
          --access-token "${{ inputs.access-token }}" \
          --app-id "${{ inputs.github-app-id }}" \
          --private-key "${{ inputs.github-app-private-key }}" \
          --app-installation-id "${{ steps.app-install.outputs.installation-id }}" \
          --owner ${{ inputs.organization }} \
          --output-path ${{ steps.setup-paths.outputs.output_dir }}/${{ inputs.organization }}-audit.csv \
          --base-url ${{ inputs.base-url }} \
          --disable-telemetry

        echo "✓ Migration audit for organization completed successfully"

    - name: Warn on Migration Audit Failure (Organization)
      if: ${{ steps.migration-audit-org.outcome == 'failure' }}
      shell: bash
      run: |
        echo "::warning::Migration audit failed but repo stats completed successfully. Check logs above for audit errors."

    - name: Convert CSV to Markdown
      if: ${{ success() && inputs.type == 'repository' }}
      shell: bash
      run: |
        CSV_FILE=$(ls ${{ steps.setup-paths.outputs.output_dir }}/${{ inputs.organization }}-*_repos-*.csv | head -n 1)

        # Create vertical markdown table
        MARKDOWN="## 📊 Repository Statistics\n\n"
        MARKDOWN+="| Metric | Value |\n"
        MARKDOWN+="|--------|-------|\n"

        # Read headers and values, create vertical table
        HEADERS=$(head -n 1 "$CSV_FILE")
        VALUES=$(tail -n 1 "$CSV_FILE")

        IFS=',' read -ra HEADER_ARRAY <<< "$HEADERS"
        IFS=',' read -ra VALUE_ARRAY <<< "$VALUES"

        for i in "${!HEADER_ARRAY[@]}"; do
          MARKDOWN+="| ${HEADER_ARRAY[$i]} | ${VALUE_ARRAY[$i]} |\n"
        done

        # Save to file for next step
        echo -e "$MARKDOWN" > ${{ steps.setup-paths.outputs.output_dir }}/stats.md

        echo "✓ CSV converted to markdown successfully"

    - name: Convert Migration Audit to Markdown
      if: inputs.run-migration-audit == 'true' && steps.migration-audit-repo.outcome == 'success' && inputs.type == 'repository'
      shell: bash
      run: |
        AUDIT_FILE="${{ steps.setup-paths.outputs.output_dir }}/${{ inputs.repository }}-audit.csv"

        MARKDOWN="\n\n## 🔍 Migration Audit Results\n\n"

        # Read CSV and create horizontal table
        while IFS=',' read -r col1 col2; do
          if [ "$col1" != "" ]; then
            # First row is headers
            if [ ! -f /tmp/headers_written ]; then
              MARKDOWN+="| $col1 | $col2 |\n"
              MARKDOWN+="|-------|-------|\n"
              touch /tmp/headers_written
            else
              MARKDOWN+="| $col1 | $col2 |\n"
            fi
          fi
        done < "$AUDIT_FILE"

        # Save to file
        echo -e "$MARKDOWN" > ${{ steps.setup-paths.outputs.output_dir }}/audit.md

        echo "✓ Migration audit CSV converted to markdown successfully"

    - name: Combine Stats
      if: ${{ inputs.type == 'combine' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        OUTPUT_DIR: ${{ steps.setup-paths.outputs.output_dir }}
      run: |
        gh repo-stats-plus combine-stats \
          --files "${OUTPUT_DIR}"/*.csv \
          --output-dir "${OUTPUT_DIR}" \
          --output-file-name combined-stats.csv

        echo "✓ Batch results combined successfully"

    - name: Upload Stats Artifact
      id: upload-artifact
      if: success()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f #v6.0.0
      with:
        name: repo-stats-${{ inputs.type }}-${{ inputs.organization }}${{ inputs.type == 'repository' && format('-{0}', inputs.repository) || '' }}${{ inputs.batch-index != '' && format('-batch-{0}', inputs.batch-index) || '' }}
        path: ${{ steps.setup-paths.outputs.output_dir }}/
        retention-days: ${{ inputs.retention-days }}

    - name: Create Stats Placeholder
      if: ${{ success() && (inputs.type == 'organization' || inputs.type == 'combine') }}
      shell: bash
      run: |
        MARKDOWN="## 📊 Repository Statistics\n\n"

        if [[ "${{ inputs.type }}" == "combine" ]]; then
          MARKDOWN+="Batch results have been combined.\n\n"
        else
          MARKDOWN+="Statistics have been collected for the organization.\n\n"
        fi

        MARKDOWN+="Please download the artifacts to view the detailed statistics.\n\n"

        MARKDOWN+="[View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n"
        MARKDOWN+="[Download Artifact](${{ steps.upload-artifact.outputs.artifact-url }})\n"

        echo -e "$MARKDOWN" > ${{ steps.setup-paths.outputs.output_dir }}/stats.md

        echo "✓ Stats placeholder created successfully"
