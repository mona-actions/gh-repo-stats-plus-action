name: Get Project Stats
description: Gathers project statistics for all repositories in an organization.
title: "Gather Stats: [Organization Name]"
labels: ["stats", "project-stats"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide the following information to gather project statistics.

  - type: input
    id: name
    attributes:
      label: Name
      description: Enter the name of the organization to gather project stats for.
      placeholder: organization
    validations:
      required: true

  - type: checkboxes
    id: options
    attributes:
      label: Additional Options
      description: Select any additional options.
      options:
        - label: Batch Processing
