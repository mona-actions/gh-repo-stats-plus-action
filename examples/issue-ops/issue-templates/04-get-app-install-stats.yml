name: Get App Install Stats
description: Gathers GitHub App installation statistics for an organization.
title: "Gather Stats: [Organization Name]"
labels: ["stats", "app-install-stats"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide the following information to gather app installation statistics.

        > **Note:** This command requires a Personal Access Token (PAT) with `read:org` scope. GitHub App tokens cannot view other apps' installations.

  - type: input
    id: name
    attributes:
      label: Name
      description: Enter the name of the organization to gather app install stats for.
      placeholder: organization
    validations:
      required: true
