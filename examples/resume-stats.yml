name: Organization Stats with Resume

# Resume support works in two ways:
#
# 1. Automatic: When you click "Re-run failed jobs" in the GitHub Actions UI,
#    the action detects run_attempt > 1 and automatically resumes from the
#    last saved state. No extra configuration needed.
#
# 2. Explicit: Set resume-from-last-save and optionally resume-run-id to
#    resume from a specific prior workflow run.

on:
  schedule:
    - cron: "0 0 * * 1" # weekly on Monday
  workflow_dispatch:
    inputs:
      organization:
        description: "Organization name"
        required: true
        default: "my-org"
      resume-from-last-save:
        description: "Resume from a previous failed run"
        type: boolean
        default: false
      resume-run-id:
        description: "Run ID to resume from (leave empty for current run / re-run)"
        required: false
        default: ""

permissions:
  contents: read
  actions: read # Required to download artifacts from previous runs

jobs:
  gather-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gather Organization Stats
        id: stats
        uses: mona-actions/gh-repo-stats-plus-action@v1
        with:
          type: organization
          github-token: ${{ github.token }}
          access-token: ${{ secrets.ACCESS_TOKEN }}
          organization: ${{ inputs.organization || 'my-org' }}
          resume-from-last-save: ${{ inputs.resume-from-last-save || 'false' }}
          resume-run-id: ${{ inputs.resume-run-id }}

      - name: Print Results
        run: |
          echo "Output directory: ${{ steps.stats.outputs.output-dir }}"
          echo "Artifact ID: ${{ steps.stats.outputs.artifact-id }}"
